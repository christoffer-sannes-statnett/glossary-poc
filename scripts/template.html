<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elhub ordliste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      color: #111;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="search"] {
      padding: 0.45rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 280px;
      outline: none;
    }
    input[type="search"]:focus { border-color: #0066cc; }

    select {
      padding: 0.45rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
    }

    .count { color: #666; font-size: 13px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    thead th {
      background: #f0f0f0;
      text-align: left;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #e6e6e6; }
    thead th[data-col]::after { content: ''; margin-left: 6px; opacity: 0.3; }
    thead th.sort-asc::after  { content: '\2191'; opacity: 1; }
    thead th.sort-desc::after { content: '\2193'; opacity: 1; }

    td {
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .slug { font-family: monospace; font-size: 12px; color: #444; }
    .replaces { display: block; font-size: 11px; color: #999; margin-top: 2px; }

    .desc { max-width: 400px; }
    .desc-en { display: block; margin-top: 3px; font-size: 12px; color: #888; font-style: italic; }

    .view-toggle { display: flex; gap: 0; }
    .view-btn {
      padding: 0.42rem 0.85rem;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      line-height: 1;
    }
    .view-btn:first-child { border-radius: 4px 0 0 4px; }
    .view-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
    .view-btn.active { background: #0066cc; color: #fff; border-color: #0066cc; }
    .view-btn:not(.active):hover { background: #f0f0f0; }

    .parent-pill {
      display: inline-block;
      background: #e8f0fe;
      color: #1a56db;
      border-radius: 3px;
      font-size: 11px;
      font-family: monospace;
      padding: 1px 5px;
      margin: 1px 2px 1px 0;
    }

    tr.hidden { display: none; }
    tr[data-status="deprecated"] td { opacity: 0.6; }
  </style>
</head>
<body>
  <h1>Elhub ordliste</h1>

  <div class="controls">
    <input type="search" id="q" placeholder="Filtrer begreper…" autocomplete="off" />
    <div class="view-toggle">
      <button id="btn-flat" class="view-btn active">Tabell</button>
      <button id="btn-hierarchy" class="view-btn">Hierarki</button>
    </div>
    <span class="count" id="count"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th data-col="0">Slug</th>
        <th data-col="1">Bokmål</th>
        <th data-col="2">Nynorsk</th>
        <th data-col="3">English</th>
        <th>Beskrivelse</th>
        <th class="th-parents">Kategori</th>
      </tr>
    </thead>
    <tbody id="tbody">
<!-- ROWS_PLACEHOLDER -->
    </tbody>
  </table>

  <script>
    const tbody = document.getElementById('tbody');
    const qInput = document.getElementById('q');
    const countEl = document.getElementById('count');

    let currentView = 'flat';
    let sortCol = null;
    let sortAsc = true;
    const originalOrder = [];

    function updateCount(n) {
      countEl.textContent = n + ' begrep' + (n !== 1 ? 'er' : '');
    }

    // --- FLAT VIEW ---

    function filter() {
      const q = qInput.value.toLowerCase().trim();
      let visible = 0;
      for (const row of tbody.rows) {
        const match = !q || row.textContent.toLowerCase().includes(q);
        row.classList.toggle('hidden', !match);
        row.cells[0].style.paddingLeft = '';
        if (match) visible++;
      }
      updateCount(visible);
    }

    function sort(col) {
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      const rows = Array.from(tbody.rows);
      rows.sort((a, b) => {
        const av = a.cells[col]?.textContent.trim().toLowerCase() ?? '';
        const bv = b.cells[col]?.textContent.trim().toLowerCase() ?? '';
        return sortAsc ? av.localeCompare(bv, 'no') : bv.localeCompare(av, 'no');
      });
      rows.forEach(r => tbody.appendChild(r));
      document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
      document.querySelector(`thead th[data-col="${col}"]`)?.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
      filter();
    }

    // --- HIERARCHY VIEW ---

    function buildAdjacency() {
      const allRows = Array.from(tbody.querySelectorAll('tr'));
      const bySlug = {};
      for (const row of allRows) bySlug[row.dataset.slug] = row;
      const childrenOf = {};
      for (const row of allRows) childrenOf[row.dataset.slug] = [];
      const roots = [];
      for (const row of allRows) {
        const parents = row.dataset.parents ? row.dataset.parents.split(',').filter(Boolean) : [];
        const primary = parents[0];
        if (primary && bySlug[primary]) childrenOf[primary].push(row);
        else roots.push(row);
      }
      return { roots, childrenOf };
    }

    function anyDescendantMatches(row, q, childrenOf) {
      if (!q || row.textContent.toLowerCase().includes(q)) return true;
      return (childrenOf[row.dataset.slug] || []).some(c => anyDescendantMatches(c, q, childrenOf));
    }

    function renderHierarchy() {
      const q = qInput.value.toLowerCase().trim();
      const { roots, childrenOf } = buildAdjacency();
      let visible = 0;
      function appendLevel(rows, depth) {
        for (const row of rows) {
          const show = anyDescendantMatches(row, q, childrenOf);
          row.classList.toggle('hidden', !show);
          if (show) visible++;
          row.cells[0].style.paddingLeft = `${0.9 + depth * 1.5}rem`;
          tbody.appendChild(row);
          appendLevel(childrenOf[row.dataset.slug] || [], depth + 1);
        }
      }
      appendLevel(roots, 0);
      updateCount(visible);
    }

    // --- VIEW SWITCHING ---

    function switchView(view) {
      currentView = view;
      document.getElementById('btn-flat').classList.toggle('active', view === 'flat');
      document.getElementById('btn-hierarchy').classList.toggle('active', view === 'hierarchy');
      if (view === 'flat') {
        originalOrder.forEach(r => tbody.appendChild(r));
        document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
        sortCol = null;
        filter();
      } else {
        renderHierarchy();
      }
    }

    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        if (currentView === 'hierarchy') return;
        sort(parseInt(th.dataset.col));
      });
    });

    qInput.addEventListener('input', () => {
      if (currentView === 'flat') filter();
      else renderHierarchy();
    });

    document.getElementById('btn-flat').addEventListener('click', () => switchView('flat'));
    document.getElementById('btn-hierarchy').addEventListener('click', () => switchView('hierarchy'));

    tbody.querySelectorAll('tr').forEach(r => originalOrder.push(r));
    filter();
  </script>
</body>
</html>
