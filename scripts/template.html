<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elhub ordliste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      color: #111;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="search"] {
      padding: 0.45rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 280px;
      outline: none;
    }
    input[type="search"]:focus { border-color: #0066cc; }

    select {
      padding: 0.45rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
    }

    .count { color: #666; font-size: 13px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    thead th {
      background: #f0f0f0;
      text-align: left;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #e6e6e6; }
    thead th[data-col]::after { content: ''; margin-left: 6px; opacity: 0.3; }
    thead th.sort-asc::after  { content: '\2191'; opacity: 1; }
    thead th.sort-desc::after { content: '\2193'; opacity: 1; }

    td {
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .slug { font-family: monospace; font-size: 12px; color: #444; }
    .replaces { display: block; font-size: 11px; color: #999; margin-top: 2px; }

    .desc { max-width: 400px; }
    .desc-en { display: block; margin-top: 3px; font-size: 12px; color: #888; font-style: italic; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .badge.active     { background: #d4edda; color: #155724; }
    .badge.deprecated { background: #f8d7da; color: #721c24; }
    .badge.draft      { background: #fff3cd; color: #856404; }

    tr.hidden { display: none; }
  </style>
</head>
<body>
  <h1>Elhub ordliste</h1>

  <div class="controls">
    <input type="search" id="q" placeholder="Filtrer begreper…" autocomplete="off" />
    <select id="statusFilter">
      <option value="">Alle statuser</option>
      <option value="active">Aktiv</option>
      <option value="draft">Utkast</option>
      <option value="deprecated">Utgått</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th data-col="0">Slug</th>
        <th data-col="1">Bokmål</th>
        <th data-col="2">Nynorsk</th>
        <th data-col="3">English</th>
        <th>Beskrivelse</th>
        <th data-col="5">Status</th>
      </tr>
    </thead>
    <tbody id="tbody">
<!-- ROWS_PLACEHOLDER -->
    </tbody>
  </table>

  <script>
    const tbody = document.getElementById('tbody');
    const qInput = document.getElementById('q');
    const statusFilter = document.getElementById('statusFilter');
    const countEl = document.getElementById('count');

    let sortCol = null;
    let sortAsc = true;

    function filter() {
      const q = qInput.value.toLowerCase().trim();
      const status = statusFilter.value;
      let visible = 0;
      for (const row of tbody.rows) {
        const text = row.textContent.toLowerCase();
        const rowStatus = row.dataset.status;
        const match = (!q || text.includes(q)) && (!status || rowStatus === status);
        row.classList.toggle('hidden', !match);
        if (match) visible++;
      }
      countEl.textContent = visible + ' begrep' + (visible !== 1 ? 'er' : '');
    }

    function sort(col) {
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      const rows = Array.from(tbody.rows);
      rows.sort((a, b) => {
        const av = a.cells[col]?.textContent.trim().toLowerCase() ?? '';
        const bv = b.cells[col]?.textContent.trim().toLowerCase() ?? '';
        return sortAsc ? av.localeCompare(bv, 'no') : bv.localeCompare(av, 'no');
      });
      rows.forEach(r => tbody.appendChild(r));
      document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
      document.querySelector(`thead th[data-col="${col}"]`)?.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
      filter();
    }

    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => sort(parseInt(th.dataset.col)));
    });

    qInput.addEventListener('input', filter);
    statusFilter.addEventListener('change', filter);
    filter();
  </script>
</body>
</html>
