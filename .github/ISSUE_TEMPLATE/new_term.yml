name: Foreslå nytt begrep
description: Foreslå et nytt begrep som skal legges til i ordlisten.
title: "[Nytt begrep]: "
labels:
  - new-term
body:
  - type: input
    id: slug
    attributes:
      label: Slug
      description: >
        Unik identifikator i SCREAMING_SNAKE_CASE (f.eks. GRID_POINT).
        Denne er permanent og kan ikke endres etter merging.
      placeholder: EKSEMPEL_BEGREP
    validations:
      required: true

  - type: input
    id: en
    attributes:
      label: Engelsk navn
      placeholder: Example term
    validations:
      required: true

  - type: input
    id: "no"
    attributes:
      label: Bokmål
      placeholder: Eksempelbegrep
    validations:
      required: true

  - type: input
    id: nn
    attributes:
      label: Nynorsk
      placeholder: Eksempelbegrep
    validations:
      required: true

  - type: textarea
    id: description_no
    attributes:
      label: Beskrivelse (norsk bokmål)
      description: En kort, forståelig forklaring av begrepet. 1–3 setninger. Valgfritt for selvforklarende begreper.
      placeholder: Beskriv hva dette begrepet betyr i en forretningskontekst.

  - type: textarea
    id: description_en
    attributes:
      label: Beskrivelse (engelsk)
      description: Valgfri forklaring på engelsk.
      placeholder: Describe what this term means in a business context.

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - draft
        - active
      default: 0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        Når du har sendt inn vil en behandler opprette en pull request med det nye begrepet.
        Du trenger ikke kjenne til Git — alt skjer automatisk.
